<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Day Sources CLI Demo</title>
  <style>body{font-family:system-ui,Arial,sans-serif;max-width:900px;margin:2rem auto;padding:0 1rem}pre{background:#111;color:#eee;padding:1rem;overflow:auto;border-radius:8px}</style>
</head>
<body>
  <h1>Day Sources Demo (1 + 3)</h1>
  <p>This page shows the latest generated output from the CLI.</p>
  <button id="reload">Reload latest</button>
  <pre id="out">Loading...</pre>
  <script>
    async function load() {
      const res = await fetch('./data-latest.json?ts=' + Date.now());
      const json = await res.json();
      document.getElementById('out').textContent = JSON.stringify(json, null, 2);
    }
    document.getElementById('reload').addEventListener('click', load);
    load();
  </script>
</body>
</html>
